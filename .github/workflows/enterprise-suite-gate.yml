# 开箱企业套件自动对标门禁（静态探针 + 单测）
name: enterprise-suite-gate

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/core/enterprise/**"
      - "backend/api/enterprise.py"
      - "backend/scripts/enterprise_suite_acceptance_gate.py"
      - "backend/tests/test_enterprise_suite_*.py"
      - "backend/core/enterprise/suite_uat.py"
      - "backend/core/enterprise/suite_live_inprocess.py"
      - "backend/tests/test_enterprise_suite_live_inprocess.py"
      - "scripts/acceptance/run_enterprise_suite_inprocess_live_gate.sh"
      - "demos/platform/**"
      - "demos/workflows/**"
      - "scripts/acceptance/run_enterprise_suite*.sh"
      - "Makefile"
  push:
    branches: [main, master]
    paths:
      - "backend/core/enterprise/**"
      - "backend/api/enterprise.py"
      - "backend/scripts/enterprise_suite_acceptance_gate.py"
      - "backend/tests/test_enterprise_suite_*.py"
      - "backend/core/enterprise/suite_uat.py"
      - "backend/core/enterprise/suite_live_inprocess.py"
      - "backend/tests/test_enterprise_suite_live_inprocess.py"
      - "scripts/acceptance/run_enterprise_suite_inprocess_live_gate.sh"
      - "demos/platform/**"
      - "demos/workflows/**"
      - "scripts/acceptance/run_enterprise_suite*.sh"
      - "Makefile"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Phase0 gate (CI default)
        run: make enterprise-suite-gate
      - name: Phase0-2 gate (static contract)
        run: make enterprise-suite-gate-all
      - name: In-process Live + UAT gate
        run: make enterprise-suite-inprocess-live-gate
      - name: Upload benchmark JSON artifact
        if: always()
        run: make enterprise-suite-benchmark-json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enterprise-suite-benchmark
          path: enterprise-suite-benchmark.json
          retention-days: 14
